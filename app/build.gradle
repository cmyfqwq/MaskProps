plugins {
    id 'com.android.application'
}

android {
    namespace 'com.oppo.spoof'
    compileSdk 35

    defaultConfig {
        applicationId 'com.oppo.spoof'
        minSdk 26
        targetSdk 35
        versionCode 13
        versionName 'v1.3'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // Xposed API（provided，不打包进 APK，LSPosed 兼容）
    compileOnly 'de.robv.android.xposed:api:82'
}
