plugins {
    id 'com.android.application' version '8.2.0'
}

android {
    namespace 'com.maskprops.app'
    compileSdk 35

    defaultConfig {
        applicationId 'com.maskprops'
        minSdk 26
        targetSdk 35
        versionCode 30
        versionName 'v3.0'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // LSPosed Xposed API（provided，不打包进 APK）
    compileOnly 'de.robv.android.xposed:api:82'
}
